<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DSA Revision — abhaykatre-dev/DSA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115; --surface:#171a21; --surface-2:#1e222b; --border:#2a2f3a;
    --text:#e6e8ec; --text-dim:#8b93a3; --accent:#f2b84b; --link:#6fb7ef;
    --easy:#4ade80; --medium:#fbbf24; --hard:#f87171; --radius:10px;
    --header-h:56px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.5;}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  code, pre, .mono{font-family:'JetBrains Mono',monospace;}
  a{color:var(--link);text-decoration:none;}
  a:hover{text-decoration:underline;}
  button{font-family:inherit;}

  .topbar{
    position:sticky; top:0; z-index:30; height:var(--header-h);
    display:flex; align-items:center; gap:10px; padding:0 14px;
    background:var(--surface); border-bottom:1px solid var(--border);
  }
  .menu-btn{
    display:none; background:none; border:1px solid var(--border); color:var(--text);
    width:36px; height:36px; border-radius:8px; font-size:16px; cursor:pointer; flex:none;
  }
  .topbar .brand{display:flex; align-items:baseline; gap:6px; flex:1; min-width:0;}
  .topbar .brand .num{color:var(--accent); font-weight:700;}
  .topbar h1{font-size:16px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .topbar .sync-label{font-size:11px; color:var(--text-dim); white-space:nowrap; flex:none;}

  .app{display:flex; min-height:calc(100vh - var(--header-h));}
  .backdrop{display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:20;}

  .sidebar{
    width:270px; flex:none; background:var(--surface); border-right:1px solid var(--border);
    padding:18px 16px; position:sticky; top:var(--header-h); align-self:flex-start;
    height:calc(100vh - var(--header-h)); overflow-y:auto;
  }
  .sync-box{background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; margin-bottom:16px; font-size:12px; color:var(--text-dim);}
  .sync-box .status-line{display:flex; align-items:center; gap:6px; margin-bottom:8px;}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--easy); flex:none;}
  .dot.loading{background:var(--accent); animation:pulse 1s infinite;}
  .dot.err{background:var(--hard);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .sync-box button{width:100%; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:7px 8px; border-radius:6px; font-size:12px; cursor:pointer;}
  .sync-box button:hover{border-color:var(--accent);}
  .sync-box button:disabled{opacity:.5;}

  .stats{display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;}
  .stat{background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:6px 8px; font-size:11px; flex:1; min-width:56px; text-align:center;}
  .stat b{display:block; font-size:15px; font-family:'Space Grotesk',sans-serif;}
  .stat.easy b{color:var(--easy);} .stat.medium b{color:var(--medium);} .stat.hard b{color:var(--hard);}

  .search{width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text);
    padding:10px 12px; border-radius:8px; font-size:14px; margin-bottom:14px;}
  .search:focus{outline:none; border-color:var(--accent);}

  .diff-filters{display:flex; gap:6px; margin-bottom:16px;}
  .chip{flex:1; text-align:center; padding:7px 0; border-radius:6px; border:1px solid var(--border); font-size:12px; cursor:pointer; color:var(--text-dim);}
  .chip.active{border-color:var(--accent); color:var(--accent);}

  .topic-nav-label{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin:0 0 8px;}
  .topic-item{display:flex; justify-content:space-between; gap:8px; padding:9px 8px; border-radius:6px; cursor:pointer; font-size:13px; color:var(--text-dim);}
  .topic-item:hover, .topic-item:active{background:var(--surface-2); color:var(--text);}
  .topic-item .cnt{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim);}

  .main{flex:1; min-width:0; padding:22px 26px 80px;}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; gap:12px; flex-wrap:wrap;}
  .toolbar h2{margin:0; font-size:14px; color:var(--text-dim); font-weight:500;}
  .toolbar-actions{display:flex; gap:8px;}
  .btn-sm{background:var(--surface); border:1px solid var(--border); color:var(--text-dim); padding:7px 11px; border-radius:6px; font-size:12px; cursor:pointer;}
  .btn-sm:active{color:var(--text); border-color:var(--accent);}

  .topic-section{margin-bottom:34px;}
  .topic-header{display:flex; align-items:baseline; gap:10px; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border);}
  .topic-header h3{margin:0; font-size:18px;}
  .topic-header .count{color:var(--text-dim); font-size:12px; font-family:'JetBrains Mono',monospace;}

  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden;}
  .card-head{display:flex; align-items:center; gap:10px; padding:14px; cursor:pointer; flex-wrap:wrap; row-gap:8px;}
  .card-head:active{background:var(--surface-2);}
  .card-head .badge-num{color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:12px; flex:none; width:44px;}
  .card-head .title{flex:1; min-width:140px; font-size:14.5px; font-weight:500;}
  .card-head .title a{color:var(--text);}
  .card-head .title a:active{color:var(--link);}
  .pill{font-size:10px; padding:3px 8px; border-radius:20px; font-family:'JetBrains Mono',monospace; flex:none;}
  .pill.easy{background:rgba(74,222,128,.12); color:var(--easy);}
  .pill.medium{background:rgba(251,191,36,.12); color:var(--medium);}
  .pill.hard{background:rgba(248,113,113,.12); color:var(--hard);}
  .chevron{color:var(--text-dim); font-size:12px; transition:transform .15s; flex:none;}
  .card.open .chevron{transform:rotate(90deg);}
  .topic-select{background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); font-size:11px; border-radius:6px; padding:5px 6px; flex:none; max-width:100%;}

  .card-body{display:none; border-top:1px solid var(--border);}
  .card.open .card-body{display:block;}
  .body-inner{display:grid; grid-template-columns:1fr 1fr;}
  .statement{padding:16px 16px; font-size:13.5px; color:var(--text-dim); border-right:1px solid var(--border); max-height:60vh; overflow:auto; -webkit-overflow-scrolling:touch;}
  .statement p{margin:0 0 10px;}
  .statement img{max-width:100%; border-radius:6px; margin:6px 0;}
  .statement pre{background:var(--surface-2); padding:8px; border-radius:6px; overflow-x:auto; font-size:12px;}
  .statement strong{color:var(--text);}
  .statement ul,.statement ol{padding-left:20px;}

  .code-panel{position:relative; background:#0a0c10; max-height:60vh; overflow:auto; -webkit-overflow-scrolling:touch;}
  .code-panel .copy-btn{position:sticky; top:8px; float:right; margin:8px 10px 0 0; background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); font-size:11px; padding:5px 10px; border-radius:6px; cursor:pointer; z-index:2;}
  .code-panel pre{margin:0; padding:14px;}
  .code-panel code{font-family:'JetBrains Mono',monospace; font-size:12.5px;}

  .empty-state{text-align:center; padding:60px 20px; color:var(--text-dim);}
  .empty-state .big{font-size:34px; margin-bottom:10px;}
  .loading-screen{display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; color:var(--text-dim); gap:14px; text-align:center; padding:0 20px;}
  .spinner{width:26px; height:26px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .progress-text{font-size:13px; font-family:'JetBrains Mono',monospace;}

  ::-webkit-scrollbar{width:9px; height:9px;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:5px;}
  ::-webkit-scrollbar-track{background:transparent;}

  @media (max-width:880px){
    .menu-btn{display:block;}
    .sidebar{
      position:fixed; top:0; left:0; height:100vh; z-index:40; width:82vw; max-width:320px;
      transform:translateX(-100%); transition:transform .2s ease; padding-top:calc(var(--header-h) + 14px);
    }
    .sidebar.open{transform:translateX(0);}
    .backdrop.show{display:block;}
    .main{padding:16px 14px 90px;}
    .card-head{padding:13px 12px;}
    .card-head .title{font-size:14px;}
    .body-inner{grid-template-columns:1fr;}
    .statement{border-right:none; border-bottom:1px solid var(--border); max-height:44vh;}
    .code-panel{max-height:50vh;}
    .toolbar h2{font-size:13px;}
    .topic-header h3{font-size:16.5px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="Open menu">☰</button>
  <div class="brand"><span class="num">DSA</span><h1>Revision</h1></div>
  <span class="sync-label" id="syncLabel">Loading…</span>
</div>

<div class="app">
  <div class="backdrop" id="backdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sync-box">
      <div class="status-line"><span class="dot" id="statusDot"></span><span id="statusText">Loading…</span></div>
      <button id="syncBtn">Refresh now</button>
    </div>
    <div class="stats" id="statsRow"></div>
    <input class="search" id="searchBox" placeholder="Search by title or number…">
    <div class="diff-filters">
      <div class="chip active" data-diff="all">All</div>
      <div class="chip" data-diff="Easy">Easy</div>
      <div class="chip" data-diff="Medium">Med</div>
      <div class="chip" data-diff="Hard">Hard</div>
    </div>
    <p class="topic-nav-label">Topics</p>
    <div id="topicNav"></div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <h2 id="resultCount">Loading problems…</h2>
      <div class="toolbar-actions">
        <button class="btn-sm" id="expandAllBtn">Expand all</button>
        <button class="btn-sm" id="collapseAllBtn">Collapse all</button>
      </div>
    </div>
    <div id="content">
      <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="progress-text" id="progressText">Fetching repo tree…</div>
      </div>
    </div>
  </main>
</div>

<script>
const OWNER = 'abhaykatre-dev';
const REPO = 'DSA';
const BRANCH = 'main';
const LS_DATA_KEY = 'dsa-cache-v1';
const LS_TOPICS_KEY = 'dsa-user-topics-v1';

let STATE = { commitSha: null, updatedAt: null, problems: {} };
let userTopics = {};
let activeDiff = 'all';
let searchTerm = '';

function loadUserTopics(){
  try{ userTopics = JSON.parse(localStorage.getItem(LS_TOPICS_KEY) || '{}'); }catch(e){ userTopics = {}; }
}
function saveUserTopics(){ try{ localStorage.setItem(LS_TOPICS_KEY, JSON.stringify(userTopics)); }catch(e){} }
function loadCache(){
  try{
    const raw = localStorage.getItem(LS_DATA_KEY);
    if(raw){ STATE = JSON.parse(raw); return true; }
  }catch(e){}
  return false;
}
function saveCache(){ try{ localStorage.setItem(LS_DATA_KEY, JSON.stringify(STATE)); }catch(e){} }

function sanitizeHtml(html){
  try{
    const doc = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('script').forEach(el => el.remove());
    doc.body.querySelectorAll('*').forEach(el=>{
      [...el.attributes].forEach(attr=>{ if(/^on/i.test(attr.name)) el.removeAttribute(attr.name); });
    });
    return doc.body.innerHTML;
  }catch(e){ return ''; }
}
function parseFolder(folder){
  const m = folder.match(/^(\d+)-(.+)$/);
  return m ? { number: parseInt(m[1],10), slug: m[2] } : null;
}
function titleFromSlug(slug){
  return slug.split('-').map(w => w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}
function parseReadme(readme, slug){
  let title = titleFromSlug(slug);
  let url = `https://leetcode.com/problems/${slug}`;
  let difficulty = 'Medium';
  const linkMatch = readme.match(/<a href="([^"]+)">([^<]+)<\/a>/);
  if(linkMatch){ url = linkMatch[1]; title = linkMatch[2]; }
  const diffMatch = readme.match(/Difficulty-(Easy|Medium|Hard)/i);
  if(diffMatch){ difficulty = diffMatch[1].charAt(0).toUpperCase()+diffMatch[1].slice(1).toLowerCase(); }
  let statement = readme.replace(/^[\s\S]*?<hr\s*\/?>/i, '').trim();
  if(!statement) statement = readme;
  return { title, url, difficulty, statement: sanitizeHtml(statement) };
}

const TOPIC_RULES = [
  [['linked-list'], 'Linked List'],
  [['tree','trie'], 'Trees & Tries'],
  [['graph','island','province','course-schedule','path-exist','component','star-graph','bipartite','safe-state','flight'], 'Graphs'],
  [['matrix','grid','region','enclave','rotting','flood-fill'], 'Grid / Matrix'],
  [['stack'], 'Stacks'],
  [['queue'], 'Queues'],
  [['heap','kth-','top-k'], 'Heaps'],
  [['backtrack','permutation','combination','n-queens','parenthes','subset'], 'Backtracking'],
  [['binary-search','peak','rotated-sorted','search-insert','sequential-digit'], 'Binary Search'],
  [['sliding-window','substring','subarray','consecutive-ones','fruit-into-basket'], 'Sliding Window'],
  [['two-sum','3sum','sum','palindrome','container','trapping','sorted-array','merge','duplicate','shuffle'], 'Two Pointers / Arrays'],
  [['greedy','jump-game','candies','assign-cookies','lemonade'], 'Greedy'],
  [['dynamic','knapsack','coin','climbing','edit-distance','points-you-can-obtain','longest-common','cost-of-buying'], 'Dynamic Programming'],
  [['bit','xor','reverse-bits','power-of-two','single-number','1-bits'], 'Bit Manipulation'],
  [['gcd','prime','concatenat','elapsed','operation','variable','pascals-triangle','rank-transform'], 'Math'],
  [['word','anagram','unique-character','occurrence','log-folder','reverse-prefix'], 'Strings'],
  [['design','implement'], 'Design'],
];
function autoTopic(slug){
  for(const [keys, topic] of TOPIC_RULES){ if(keys.some(k => slug.includes(k))) return topic; }
  return 'Arrays & Misc';
}
const LANG_MAP = {py:'python', js:'javascript', ts:'typescript', java:'java', cpp:'cpp', cc:'cpp', c:'c', go:'go', rb:'ruby'};
const ALL_TOPICS = [...new Set(TOPIC_RULES.map(r=>r[1])), 'Arrays & Misc'];

async function getLatestCommitSha(){
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/commits/${BRANCH}`);
  if(!r.ok) throw new Error(`commit check failed (HTTP ${r.status})`);
  const j = await r.json();
  return j.sha;
}
async function getTree(){
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${BRANCH}?recursive=1`);
  if(!r.ok) throw new Error(`tree fetch failed (HTTP ${r.status})`);
  const j = await r.json();
  return j.tree || [];
}
async function fetchRaw(path){
  const r = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${path}`);
  if(!r.ok) throw new Error(`raw fetch failed (HTTP ${r.status}): ${path}`);
  return await r.text();
}
async function pool(items, worker, concurrency, onProgress){
  let i = 0, done = 0;
  const results = new Array(items.length);
  async function run(){
    while(i < items.length){
      const idx = i++;
      try{ results[idx] = await worker(items[idx]); }catch(e){ results[idx] = null; }
      done++;
      if(onProgress) onProgress(done, items.length);
    }
  }
  await Promise.all(Array.from({length: Math.min(concurrency, items.length)}, run));
  return results;
}

async function fullSync(){
  setStatus('loading', 'Syncing with GitHub…');
  showLoadingScreen('Fetching repo file tree…');
  const [sha, tree] = await Promise.all([getLatestCommitSha(), getTree()]);
  const folderMap = {};
  for(const entry of tree){
    if(entry.type !== 'blob') continue;
    const parts = entry.path.split('/');
    if(parts.length !== 2) continue;
    const [folder, file] = parts;
    if(!parseFolder(folder)) continue;
    folderMap[folder] = folderMap[folder] || {};
    if(file === 'README.md') folderMap[folder].readmePath = entry.path;
    else folderMap[folder].codePath = entry.path;
  }
  const folders = Object.keys(folderMap).filter(f => folderMap[f].readmePath && folderMap[f].codePath);
  showLoadingScreen(`Fetching ${folders.length} problems…`);
  const newProblems = {};
  await pool(folders, async (folder) => {
    const { readmePath, codePath } = folderMap[folder];
    const { number, slug } = parseFolder(folder);
    const [readme, code] = await Promise.all([fetchRaw(readmePath), fetchRaw(codePath)]);
    const meta = parseReadme(readme, slug);
    const ext = codePath.split('.').pop();
    newProblems[folder] = {
      folder, number, slug, title: meta.title, url: meta.url, difficulty: meta.difficulty,
      statement: meta.statement, code, lang: LANG_MAP[ext] || 'plaintext', autoTopic: autoTopic(slug)
    };
  }, 8, (done, total) => showLoadingScreen(`Fetching problems… ${done}/${total}`));

  STATE.commitSha = sha;
  STATE.updatedAt = new Date().toISOString();
  STATE.problems = newProblems;
  saveCache();
  setStatus('ok', `Synced · ${folders.length} problems`);
}

async function checkForUpdates(){
  try{
    setStatus('loading', 'Checking for updates…');
    const sha = await getLatestCommitSha();
    if(sha !== STATE.commitSha){ await fullSync(); render(); }
    else setStatus('ok', `Up to date · synced ${timeAgo(STATE.updatedAt)}`);
  }catch(e){ setStatus('err', 'Could not check for updates'); }
}
function timeAgo(iso){
  if(!iso) return 'never';
  const s = Math.floor((Date.now() - new Date(iso).getTime())/1000);
  if(s < 60) return 'just now';
  if(s < 3600) return Math.floor(s/60)+'m ago';
  if(s < 86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function setStatus(kind, text){
  const dot = document.getElementById('statusDot');
  dot.className = 'dot' + (kind === 'loading' ? ' loading' : kind === 'err' ? ' err' : '');
  document.getElementById('statusText').textContent = text;
  document.getElementById('syncLabel').textContent = text;
}
function showLoadingScreen(text){
  const content = document.getElementById('content');
  if(!document.getElementById('loadingScreen')){
    content.innerHTML = `<div class="loading-screen" id="loadingScreen"><div class="spinner"></div><div class="progress-text" id="progressText"></div></div>`;
  }
  const pt = document.getElementById('progressText');
  if(pt) pt.textContent = text;
}

function escapeHtml(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function slugify(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-'); }
function getProblemsList(){ return Object.values(STATE.problems).sort((a,b) => a.number - b.number); }
function groupByTopic(list){
  const groups = {};
  for(const p of list){
    const topic = userTopics[p.folder] || p.autoTopic;
    groups[topic] = groups[topic] || [];
    groups[topic].push(p);
  }
  return groups;
}
function renderStats(list){
  const easy = list.filter(p=>p.difficulty==='Easy').length;
  const medium = list.filter(p=>p.difficulty==='Medium').length;
  const hard = list.filter(p=>p.difficulty==='Hard').length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><b>${list.length}</b>total</div>
    <div class="stat easy"><b>${easy}</b>easy</div>
    <div class="stat medium"><b>${medium}</b>med</div>
    <div class="stat hard"><b>${hard}</b>hard</div>`;
}
function renderTopicNav(groups){
  const nav = document.getElementById('topicNav');
  const topics = Object.keys(groups).sort((a,b)=>groups[b].length-groups[a].length);
  nav.innerHTML = topics.map(t => `
    <div class="topic-item" data-scroll="topic-${slugify(t)}"><span>${t}</span><span class="cnt">${groups[t].length}</span></div>`).join('');
  nav.querySelectorAll('.topic-item').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById(el.dataset.scroll)?.scrollIntoView({behavior:'smooth', block:'start'});
      closeSidebar();
    });
  });
}
function render(){
  const all = getProblemsList();
  if(all.length === 0){
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="big">📭</div>No problems loaded yet.</div>`;
    return;
  }
  renderStats(all);
  let list = all;
  if(activeDiff !== 'all') list = list.filter(p => p.difficulty === activeDiff);
  if(searchTerm){
    const q = searchTerm.toLowerCase();
    list = list.filter(p => p.title.toLowerCase().includes(q) || String(p.number).includes(q) || p.slug.includes(q));
  }
  const groups = groupByTopic(list);
  renderTopicNav(groupByTopic(all));
  document.getElementById('resultCount').textContent = `${list.length} problem${list.length!==1?'s':''} shown`;
  if(list.length === 0){
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="big">🔍</div>No problems match your filters.</div>`;
    return;
  }
  const topics = Object.keys(groups).sort();
  document.getElementById('content').innerHTML = topics.map(topic => {
    const items = groups[topic].sort((a,b)=>a.number-b.number);
    return `
      <section class="topic-section" id="topic-${slugify(topic)}">
        <div class="topic-header"><h3>${topic}</h3><span class="count">${items.length}</span></div>
        ${items.map(renderCard).join('')}
      </section>`;
  }).join('');
  attachCardHandlers();
}
function renderCard(p){
  const diffClass = p.difficulty.toLowerCase();
  const currentTopic = userTopics[p.folder] || p.autoTopic;
  const options = ALL_TOPICS.map(t => `<option value="${t}" ${t===currentTopic?'selected':''}>${t}</option>`).join('');
  return `
    <div class="card" data-folder="${p.folder}">
      <div class="card-head">
        <span class="chevron">▶</span>
        <span class="badge-num">#${p.number}</span>
        <span class="title"><a href="${p.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escapeHtml(p.title)}</a></span>
        <span class="pill ${diffClass}">${p.difficulty}</span>
        <select class="topic-select" onclick="event.stopPropagation()">${options}</select>
      </div>
      <div class="card-body">
        <div class="body-inner">
          <div class="statement">${p.statement}</div>
          <div class="code-panel">
            <button class="copy-btn">Copy</button>
            <pre><code class="language-${p.lang}">${escapeHtml(p.code)}</code></pre>
          </div>
        </div>
      </div>
    </div>`;
}
function attachCardHandlers(){
  document.querySelectorAll('.card').forEach(card => {
    const head = card.querySelector('.card-head');
    head.addEventListener('click', () => {
      const wasOpen = card.classList.contains('open');
      card.classList.toggle('open');
      if(!wasOpen){
        card.querySelectorAll('pre code').forEach(block => {
          if(!block.dataset.hl){ hljs.highlightElement(block); block.dataset.hl = '1'; }
        });
      }
    });
    card.querySelector('.topic-select').addEventListener('change', (e) => {
      userTopics[card.dataset.folder] = e.target.value;
      saveUserTopics();
      render();
    });
    card.querySelector('.copy-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const code = card.querySelector('.code-panel code').textContent;
      const btn = e.currentTarget;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1200);
      });
    });
  });
}

function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('backdrop').classList.add('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('backdrop').classList.remove('show'); }
document.getElementById('menuBtn').addEventListener('click', openSidebar);
document.getElementById('backdrop').addEventListener('click', closeSidebar);

document.getElementById('syncBtn').addEventListener('click', async () => {
  document.getElementById('syncBtn').disabled = true;
  try{ await fullSync(); render(); }
  catch(e){ setStatus('err', 'Sync failed: ' + (e && e.message ? e.message : e)); }
  document.getElementById('syncBtn').disabled = false;
});
document.getElementById('searchBox').addEventListener('input', (e) => { searchTerm = e.target.value.trim(); render(); });
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeDiff = chip.dataset.diff;
    render();
  });
});
document.getElementById('expandAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => {
    c.classList.add('open');
    c.querySelectorAll('pre code').forEach(block => {
      if(!block.dataset.hl){ hljs.highlightElement(block); block.dataset.hl = '1'; }
    });
  });
});
document.getElementById('collapseAllBtn').addEventListener('click', () => {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('open'));
});

(async function init(){
  loadUserTopics();
  const hadCache = loadCache();
  if(hadCache && Object.keys(STATE.problems).length > 0){
    setStatus('ok', `Loaded from cache · synced ${timeAgo(STATE.updatedAt)}`);
    render();
    checkForUpdates();
  } else {
    try{ await fullSync(); render(); }
    catch(e){
      const msg = (e && e.message) ? e.message : String(e);
      setStatus('err', 'Sync failed: ' + msg);
      document.getElementById('content').innerHTML = `<div class="empty-state"><div class="big">⚠️</div>Couldn't reach GitHub.<br><span class="mono" style="font-size:12px;">${escapeHtml(msg)}</span><br><br>Tap "Refresh now" to retry.</div>`;
    }
  }
})();
</script>
</body>
</html>
